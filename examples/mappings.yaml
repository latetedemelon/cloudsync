# cloudsync mappings
# ==================
# Every mapping pairs a local source folder with a remote destination and
# declares:
#   id        = [a-z0-9][a-z0-9_-]{0,63}   (used in systemd unit names)
#   mode      = "sync"   -> rclone sync (mirror, deletions propagate)
#             | "backup" -> restic via rclone (versioned, deduplicated, encrypted)
#   trigger   = "scheduled" | "realtime" | "both"
#   schedule  = systemd OnCalendar expression (used if trigger includes scheduled)
#   debounce  = seconds to wait after a change before syncing (realtime only)
#   timeout   = systemd TimeoutStartSec value (default: 6h)
#   retention.prune = "always" (default) | "never"  (backup mode only)
#
# Destination syntax is always rclone-style: <remote>:<path>
# `<remote>` is a name you defined with `rclone config`; the backend can be
# anything rclone supports (S3, B2, Google Drive, Dropbox, OneDrive, pCloud,
# SFTP, WebDAV, SMB, local, …). See https://rclone.org/overview/.
# For backup mode, restic sits on top (restic -r rclone:<remote>:<path>).
#
# The placeholder names below (`primary`, `archive`, `offsite`) are just
# examples — change them to match the remote names in your rclone.conf.

defaults:
  rclone_flags:
    - "--fast-list"
  exclude:
    - ".DS_Store"
    - "Thumbs.db"
    - "*.swp"
    - ".stversions/"

mappings:

  # --- SYNC, realtime + scheduled safety net, to the primary remote ---
  - id: documents
    source: /srv/data/documents
    destination: primary:Backup/documents
    mode: sync
    trigger: both
    schedule: hourly
    debounce: 60
    exclude:
      - "*.tmp"
      - ".sync-conflict-*"

  # --- BACKUP (versioned, encrypted), scheduled daily, to the archive remote ---
  - id: photos
    source: /srv/data/photos
    destination: archive:restic/photos
    mode: backup
    trigger: scheduled
    schedule: "daily"
    timeout: "12h"  # large photo libraries can take a while on first upload
    password_file: /etc/cloudsync/secrets/photos.pass
    retention:
      keep_daily: 7
      keep_weekly: 4
      keep_monthly: 12
      keep_yearly: 3
      prune: always   # run `restic forget --prune` on every backup

  # --- SYNC, realtime only, to an offsite server (e.g. SFTP/WebDAV remote) ---
  - id: code
    source: /home/rob/code
    destination: offsite:/backups/code
    mode: sync
    trigger: realtime
    debounce: 45
    exclude:
      - "node_modules/"
      - ".venv/"
      - "__pycache__/"
      - "target/"
      - ".git/objects/pack/tmp_pack_*"

  # --- BACKUP, scheduled weekly Sunday 03:00, to the offsite remote ---
  # Prune is disabled here because we back up frequently; run prune weekly
  # via a separate cron/timer instead.
  - id: homelab-configs
    source: /srv/data/homelab
    destination: offsite:/backups/restic/homelab
    mode: backup
    trigger: scheduled
    schedule: "Sun *-*-* 03:00:00"
    password_file: /etc/cloudsync/secrets/homelab.pass
    retention:
      keep_weekly: 8
      keep_monthly: 12
      keep_yearly: 5
      prune: never

  # --- SYNC, scheduled every 15 minutes, fan out to multiple destinations ---
  # (For a single source to multiple destinations, declare one mapping per dest.)
  - id: finance-to-primary
    source: /srv/data/finance
    destination: primary:Backup/finance
    mode: sync
    trigger: scheduled
    schedule: "*:0/15"

  - id: finance-to-archive
    source: /srv/data/finance
    destination: archive:Backup/finance
    mode: sync
    trigger: scheduled
    schedule: "*:0/15"

  # --- BACKUP to a locally-mounted NAS (NFS/SMB/autofs at /mnt/nas) ---
  # rclone.conf:
  #   [nas]
  #   type = local
  # The `local` backend has no root path, so the full mount path goes
  # after the colon. See the README "Configure your rclone remotes"
  # section for the `alias` trick if you'd rather use `nas:backups/...`.
  - id: media-to-nas
    source: /srv/data/media
    destination: nas:/mnt/nas/restic/media
    mode: backup
    trigger: scheduled
    schedule: "*-*-* 02:30:00"
    password_file: /etc/cloudsync/secrets/media.pass
    retention:
      keep_daily: 14
      keep_weekly: 8
      keep_monthly: 12
      keep_yearly: 3
      prune: always
